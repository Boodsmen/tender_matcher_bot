version: '3.8'

services:
  db:
    image: postgres:16
    container_name: tender_matcher_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tender_matcher}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: tender_matcher_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-tender_matcher}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_ROUTER_MODEL=${OPENAI_ROUTER_MODEL}
      - LLM_PARSING_ENABLED=${LLM_PARSING_ENABLED:-true}
      - LLM_CHAR_MATCHING_ENABLED=${LLM_CHAR_MATCHING_ENABLED:-true}
      - ADMIN_IDS=${ADMIN_IDS}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-70}
      - ALLOW_LOWER_VALUES=${ALLOW_LOWER_VALUES}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./temp_files:/app/temp_files
    restart: unless-stopped

  test_db:
    image: postgres:16
    container_name: tender_matcher_test_db
    environment:
      POSTGRES_DB: tender_test_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["test"]

  test:
    build: .
    container_name: tender_matcher_test
    depends_on:
      test_db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=test_db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=tender_test_db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test_key}
      - BOT_TOKEN=test_token
      - MATCH_THRESHOLD=89
    volumes:
      - ./data:/app/data
    command: ["pytest", "tests/", "-v", "--tb=short"]
    profiles: ["test"]

volumes:
  postgres_data:
